<!DOCTYPE html>
<html>
<head>
  <title>Lavkesh Apps Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    h1 {
      padding: 15px;
    }

    input {
      padding: 10px;
      width: 80%;
      max-width: 400px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      color: black;
      width: 250px;
      margin: 15px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    }

    .card img {
      width: 80px;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #1e3c72;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: #2a5298;
    }
  </style>
</head>

<body>

  <h1>🔥 Lavkesh Apps Hub 🔥</h1>
  <p>Download Best Apps 👇</p>

  <!-- 🔍 Search Bar -->
  <input type="text" id="search" placeholder="Search apps..." onkeyup="searchApp()">

  <div class="container" id="appList">

    <!-- CapCut -->
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968520.png">
      <h3>CapCut</h3>
      <p>Best video editing app 🔥</p>
      <a class="btn" href="https://play.google.com/store/apps/details?id=com.lemon.lvoverseas" target="_blank">Open</a><br>
      <a class="btn" href="https://play.google.com/store/apps/details?id=com.lemon.lvoverseas" target="_blank">Download APK</a>
    </div>

    <!-- Instagram -->
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
      <h3>Instagram</h3>
      <p>Social media app</p>
      <a class="btn" href="https://www.instagram.com" target="_blank">Open</a><br>
      <a class="btn" href="#">Download APK</a>
    </div>

    <!-- WhatsApp -->
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
      <h3>WhatsApp</h3>
      <p>Chat app</p>
      <a class="btn" href="https://play.google.com/store/apps/details?id=com.whatsapp" target="_blank">Open</a><br>
      <a class="btn" href="#">Download APK</a>
    </div>

  </div>

  <!-- 🔍 Search Script -->
  <script>
    function searchApp() {
      let input = document.getElementById("search").value.toLowerCase();
      let cards = document.getElementsByClassName("card");

      for (let i = 0; i < cards.length; i++) {
        let title = cards[i].getElementsByTagName("h3")[0].innerText.toLowerCase();

        if (title.includes(input)) {
          cards[i].style.display = "block";
        } else {
          cards[i].style.display = "none";
        }
      }
    }
  </script>

</body>
</html>
